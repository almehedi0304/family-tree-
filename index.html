<!DOCTYPE html>
<html>
<head>
    <title>আমাদের পরিবার</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>আমাদের পারিবারিক বৃক্ষ 🌳</h1>

    <div class="tree">

        <!-- Top Generation -->
        <div class="level">
            <div class="node">দাদা</div>
            <div class="node">দাদী</div>
        </div>

        <div class="connector"></div>

        <!-- Parents -->
        <div class="level">
            <div class="node">মেহেদী (বাবা)</div>
            <div class="node">সাওদা (মা)</div>
        </div>

        <div class="connector"></div>

        <!-- Children -->
        <div class="level">
            <div class="node">সায়ন</div>
            <div class="node">আরেক সন্তান</div>
            <div class="node">তৃতীয় সন্তান</div>
        </div>

    </div>

</body>
</html>

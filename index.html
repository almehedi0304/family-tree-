<!DOCTYPE html>
<html>
<head>
    <title>আমাদের পরিবার</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>আমাদের পারিবারিক বৃক্ষ 🌳</h1>

    <div class="tree">

        <!-- Parents -->
        <div class="level">
            <div class="node">মেহেদী (বাবা)</div>
            <div class="node">সাওদা (মা)</div>
        </div>

        <!-- Connector -->
        <div class="v-line"></div>
        <div class="h-line"></div>

        <!-- Children -->
        <div class="level">
            <div class="node">সায়ন (সন্তান)</div>
            <div class="node">আরেক সন্তান (যদি থাকে)</div>
        </div>

    </div>

</body>
</html>
